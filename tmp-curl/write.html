	<script type="text/javascript">
	(() => {
		const form = document.querySelector(".skilltree-post-form");
		if (!form) {
			return;
		}
		const returnUrl = form.dataset.returnUrl;
		if (!returnUrl) {
			return;
		}
		const skipKey = "skilltreePostFormBackSkip";

		form.addEventListener("submit", () => {
			sessionStorage.setItem(skipKey, JSON.stringify({
				path: window.location.pathname + window.location.search,
				returnUrl: returnUrl
			}));
		});

		window.addEventListener("pageshow", (event) => {
			const raw = sessionStorage.getItem(skipKey);
			if (!raw) {
				return;
			}
			const navigation = performance.getEntriesByType("navigation");
			const isBackForward = event.persisted || (navigation.length > 0 && navigation[0].type === "back_forward");
			if (!isBackForward) {
				return;
			}
			try {
				const saved = JSON.parse(raw);
				if (saved.path === window.location.pathname + window.location.search && saved.returnUrl) {
					sessionStorage.removeItem(skipKey);
					window.location.replace(saved.returnUrl);
				}
			} catch (error) {
				sessionStorage.removeItem(skipKey);
			}
		});
	})();
</script>
