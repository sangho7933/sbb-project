<html layout:decorate="~{a2c_layout}">
<div layout:fragment="content" class="auth-shell">
	<div class="auth-card">
		<div class="auth-copy">
			<span class="section-kicker">A2C LOGIN</span>
			<h1>로그인</h1>
			<p>커뮤니티 글쓰기, 댓글, 추천 기능은 로그인 후 사용할 수 있습니다.</p>
		</div>
		<form th:action="@{/user/login}" method="post" class="auth-form">
			<input type="hidden" name="redirect" th:if="${param.redirect != null}" th:value="${param.redirect}" />
			<div th:if="${param.expired != null}" class="auth-alert">
				세션이 만료되어 다시 로그인해 주세요.
			</div>
			<div th:if="${param.error != null and loginErrorMessage != null and !#strings.isEmpty(loginErrorMessage)}"
				 class="auth-alert"
				 th:text="${loginErrorMessage}">
				사용자 ID 또는 비밀번호를 확인해 주세요.
			</div>
			<div th:if="${param.error != null and (loginErrorMessage == null or #strings.isEmpty(loginErrorMessage))}"
				 class="auth-alert">
				사용자 ID 또는 비밀번호를 확인해 주세요.
			</div>
			<div class="form-group-stack">
				<label for="username" class="form-label">사용자 ID</label>
				<input type="text" name="username" id="username" class="form-control form-control-lg" placeholder="아이디를 입력하세요">
			</div>
			<div class="form-group-stack">
				<label for="password" class="form-label">비밀번호</label>
				<input type="password" name="password" id="password" class="form-control form-control-lg" placeholder="비밀번호를 입력하세요">
			</div>
			<button type="submit" class="btn btn-a2c-primary w-100">로그인</button>
			<div class="auth-footer-text">
				처음이라면 <a th:href="@{/user/signup}">회원가입</a>부터 진행해 주세요.
			</div>
			<div class="auth-footer-text">
				관리자 계정: <strong>admin</strong> / <strong>1234</strong>
			</div>
		</form>
	</div>
</div>
</html>
