<html layout:decorate="~{a2c_layout}">
<div layout:fragment="content" class="board-shell">
	<div class="container comment-form-shell">
		<div class="panel-surface form-panel">
			<div class="form-panel-head">
				<span class="section-kicker" th:text="|${currentJob.icon} ${currentJob.label}|">검성</span>
				<h1>스킬트리 댓글 수정</h1>
			</div>
			<form th:object="${skillTreeCommentForm}" method="post" class="board-form-stack">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
				<div th:replace="~{form_feedback :: formFeedbackFragment}"></div>
				<div class="form-group-stack">
					<label for="content" class="form-label">댓글 내용</label>
					<textarea th:field="*{content}" class="form-control" rows="10" placeholder="댓글을 수정하세요"></textarea>
				</div>
				<div class="form-action-row">
					<button type="submit" class="btn btn-a2c-primary">수정 저장</button>
					<a class="btn btn-a2c-secondary" th:href="@{|/skilltree/${comment.post.job.slug}/posts/${comment.post.id}|}">원문으로</a>
				</div>
			</form>
		</div>
	</div>
</div>
</html>
