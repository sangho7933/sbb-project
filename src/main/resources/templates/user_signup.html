<html layout:decorate="~{a2c_layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:th="http://www.thymeleaf.org">
<div layout:fragment="content" class="auth-shell">
	<div class="auth-card auth-card-wide">
		<div class="auth-copy">
			<span class="section-kicker">A2C SIGN UP</span>
			<h1>회원가입</h1>
			<p>가입과 동시에 시작 골드 1,000G가 지급되며, 종족을 선택하면 해당 종족 기준으로 마이페이지와 시뮬레이터가 동작합니다.</p>
		</div>
		<form th:action="@{/user/signup}" th:object="${userCreateForm}" method="post" class="auth-form">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
			<div th:replace="~{form_feedback :: formFeedbackFragment}"></div>
			<div class="form-grid-2">
				<div class="form-group-stack">
					<label for="username" class="form-label">사용자 ID</label>
					<input type="text" th:field="*{username}" class="form-control form-control-lg" placeholder="사용할 아이디">
				</div>
				<div class="form-group-stack">
					<label for="email" class="form-label">이메일</label>
					<input type="email" th:field="*{email}" class="form-control form-control-lg" placeholder="example@email.com">
				</div>
				<div class="form-group-stack">
					<label for="password1" class="form-label">비밀번호</label>
					<input type="password" th:field="*{password1}" class="form-control form-control-lg" placeholder="비밀번호 입력">
				</div>
				<div class="form-group-stack">
					<label for="password2" class="form-label">비밀번호 확인</label>
					<input type="password" th:field="*{password2}" class="form-control form-control-lg" placeholder="비밀번호 다시 입력">
				</div>
			</div>

			<div class="form-group-stack mt-4">
				<label class="form-label d-block">종족 선택</label>
				<div class="d-flex flex-wrap gap-3">
					<label class="auth-race-option" th:each="race : ${races}">
						<input type="radio" th:field="*{race}" th:value="${race.code}">
						<span>
							<strong th:text="${race.label}">천족</strong>
							<small class="d-block text-white-50" th:text="${race.code == 'elyos' ? '빛의 세력' : '어둠의 세력'}">빛의 세력</small>
						</span>
					</label>
				</div>
				<div class="text-danger small mt-2" th:if="${#fields.hasErrors('race')}" th:errors="*{race}"></div>
			</div>

			<button type="submit" class="btn btn-a2c-primary w-100 mt-4">회원가입 완료</button>
		</form>
	</div>
</div>
</html>
