<html layout:decorate="~{a2c_layout}">
<div layout:fragment="content" class="board-shell">
	<div class="container board-form-shell">
		<div class="panel-surface form-panel">
			<div class="form-panel-head">
				<span class="section-kicker" th:text="${currentCategory.label}">자유게시판</span>
				<h1 th:text="${post != null ? '게시글 수정' : '새 글 작성'}">새 글 작성</h1>
			</div>
			<form th:object="${boardPostForm}"
				th:action="@{${formAction}}"
				method="post" enctype="multipart/form-data" class="board-form-stack">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
				<div th:replace="~{form_feedback :: formFeedbackFragment}"></div>
				<div class="form-group-stack">
					<label for="subject" class="form-label">제목</label>
					<input type="text" th:field="*{subject}" class="form-control form-control-lg" placeholder="제목을 입력해 주세요">
				</div>
				<div class="ai-draft-box" th:if="${post == null}">
					<div class="ai-draft-box-head">
						<h2>AI 작성 도우미</h2>
						<p class="form-help-text ai-draft-box-copy">원하는 글 내용을 입력하면 제목과 본문 초안을 자동으로 채워줍니다.</p>
					</div>
					<div class="ai-draft-row">
						<input type="text" id="aiDraftPrompt" class="form-control" th:placeholder="|예) ${currentCategory.label}에 올릴 글 초안 써줘|"
							maxlength="200" th:value="${#lists.isEmpty(param.aiPrompt) ? '' : param.aiPrompt[0]}">
						<button type="button" id="aiDraftGenerateButton" class="btn btn-a2c-secondary ai-draft-button"
							th:data-draft-url="@{|/ai/boards/${currentCategory.code}/draft|}">AI 초안 생성</button>
					</div>
					<p id="aiDraftFeedback" class="form-help-text ai-draft-feedback" aria-live="polite" hidden></p>
				</div>
				<div class="form-group-stack">
					<label for="content" class="form-label">내용</label>
					<textarea th:field="*{content}" class="form-control" rows="14" placeholder="내용을 입력해 주세요"></textarea>
				</div>
				<div class="form-group-stack">
					<label for="youtubeUrl" class="form-label">유튜브 링크</label>
					<input type="text" th:field="*{youtubeUrl}" class="form-control" placeholder="https://www.youtube.com/watch?v=... 또는 https://youtu.be/...">
					<p class="form-help-text">유튜브 링크를 입력하면 상세 페이지에서 동영상 형태로 바로 재생됩니다.</p>
				</div>
				<div class="form-group-stack" th:if="${currentCategory.mediaUploadSupported}">
					<label for="mediaFile" class="form-label">미디어 첨부</label>
					<input type="file" th:field="*{mediaFile}" class="form-control" accept="image/*,video/mp4,video/webm,video/ogg,video/quicktime,video/x-matroska">
					<p class="form-help-text">하이라이트와 보스공략 게시판에서는 이미지와 동영상을 함께 올릴 수 있습니다. 동영상 업로드는 MP4/WebM 형식을 권장합니다.</p>
				</div>
				<div class="post-media-shell" th:if="${post != null and post.hasMedia()}">
					<div class="post-media-head">
						<strong>현재 첨부 파일</strong>
						<span th:text="${post.mediaOriginalName}"></span>
					</div>
					<div class="post-media-box">
						<video th:if="${post.hasVideoMedia()}" class="post-media-video" controls preload="metadata">
							<source th:src="${post.mediaPath}" th:type="${post.mediaContentType}">
						</video>
						<img th:if="${post.hasImageMedia()}" class="post-media-image" th:src="${post.mediaPath}" th:alt="${post.mediaOriginalName}">
						<a class="btn btn-a2c-secondary btn-sm" th:href="${post.mediaPath}" target="_blank" rel="noopener">새 창에서 보기</a>
					</div>
					<label class="media-remove-row" th:if="${currentCategory.mediaUploadSupported}">
						<input type="checkbox" th:field="*{removeMedia}">
						<span>현재 첨부 파일 삭제</span>
					</label>
				</div>
				<div class="form-action-row">
					<button type="submit" class="btn btn-a2c-primary">저장하기</button>
					<a class="btn btn-a2c-secondary" th:href="@{|/boards/${currentCategory.code}|}">목록으로</a>
				</div>
			</form>
		</div>
	</div>
</div>
<script layout:fragment="script" type="text/javascript">
	(() => {
		const promptInput = document.getElementById("aiDraftPrompt");
		const generateButton = document.getElementById("aiDraftGenerateButton");
		const feedback = document.getElementById("aiDraftFeedback");
		const subjectField = document.getElementById("subject");
		const contentField = document.getElementById("content");

		if (!promptInput || !generateButton || !feedback || !subjectField || !contentField) {
			return;
		}

		const csrfTokenMeta = document.querySelector('meta[name="_csrf"]');
		const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
		const defaultButtonText = generateButton.textContent;

		function setFeedback(message, isError) {
			feedback.textContent = message || "";
			feedback.hidden = !message;
			feedback.classList.toggle("is-visible", Boolean(message));
			feedback.classList.toggle("is-error", Boolean(message) && Boolean(isError));
			feedback.classList.toggle("is-success", Boolean(message) && !isError);
		}

		async function requestDraft(promptOverride) {
			const prompt = (promptOverride ?? promptInput.value).trim();
			if (!prompt) {
				setFeedback("요청 내용을 입력해 주세요.", true);
				promptInput.focus();
				return;
			}

			promptInput.value = prompt;

			const headers = {
				"Content-Type": "application/json",
				"Accept": "application/json"
			};

			if (csrfTokenMeta && csrfHeaderMeta) {
				headers[csrfHeaderMeta.content] = csrfTokenMeta.content;
			}

			generateButton.disabled = true;
			generateButton.textContent = "생성 중...";
			setFeedback("AI가 초안을 만들고 있습니다.", false);

			try {
				const response = await fetch(generateButton.dataset.draftUrl, {
					method: "POST",
					headers: headers,
					body: JSON.stringify({ prompt: prompt })
				});
				const data = await response.json().catch(() => ({}));

				if (!response.ok || !data.title || !data.content) {
					throw new Error(data.message || "AI 초안 생성에 실패했습니다. 잠시 후 다시 시도해 주세요.");
				}

				subjectField.value = data.title;
				contentField.value = data.content;
				setFeedback("초안을 채웠습니다. 필요한 부분만 다듬어서 저장해 주세요.", false);
				contentField.focus();
			} catch (error) {
				setFeedback(error.message || "AI 초안 생성에 실패했습니다. 잠시 후 다시 시도해 주세요.", true);
			} finally {
				generateButton.disabled = false;
				generateButton.textContent = defaultButtonText;
			}
		}

		generateButton.addEventListener("click", requestDraft);
		promptInput.addEventListener("keydown", (event) => {
			if (event.key !== "Enter") {
				return;
			}
			event.preventDefault();
			requestDraft();
		});

		const autoPrompt = new URLSearchParams(window.location.search).get("aiPrompt");
		if (autoPrompt && !subjectField.value.trim() && !contentField.value.trim()) {
			requestDraft(autoPrompt);
		}
	})();
</script>
</html>
