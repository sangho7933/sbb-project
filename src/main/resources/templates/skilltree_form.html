<html layout:decorate="~{a2c_layout}">
<div layout:fragment="content" class="board-shell">
	<div class="container board-form-shell">
		<div class="panel-surface form-panel">
			<div class="form-panel-head">
				<span class="section-kicker">SKILLTREE</span>
				<h1 th:text="${post != null ? '스킬트리 글 수정' : '스킬트리 글 작성'}">스킬트리 글 작성</h1>
			</div>
			<form th:object="${skillTreePostForm}" th:action="@{${formAction}}" method="post"
				th:data-return-url="${returnUrl}" class="board-form-stack skilltree-post-form">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
				<input type="hidden" name="returnUrl" th:value="${returnUrl}" />
				<div th:replace="~{form_feedback :: formFeedbackFragment}"></div>
				<div class="form-group-stack">
					<label for="job" class="form-label">직업</label>
					<select th:field="*{job}" class="form-control">
						<option value="">직업을 선택하세요</option>
						<option th:each="job : ${skillTreeJobs}" th:value="${job.slug}" th:text="|${job.icon} ${job.label}|"></option>
					</select>
				</div>
				<div class="form-group-stack">
					<label for="subject" class="form-label">제목</label>
					<input type="text" th:field="*{subject}" class="form-control form-control-lg" placeholder="스킬트리 제목을 입력하세요">
				</div>
				<div class="form-group-stack">
					<label for="content" class="form-label">내용</label>
					<textarea th:field="*{content}" class="form-control" rows="14" placeholder="스킬트리, 운영 방식, 추천 포인트를 적어주세요"></textarea>
				</div>
				<div class="form-action-row">
					<button type="submit" class="btn btn-a2c-primary">저장하기</button>
					<a class="btn btn-a2c-secondary"
						th:href="${returnUrl != null and !#strings.isEmpty(returnUrl)} ? @{${returnUrl}} : (${skillTreePostForm.job != null and !#strings.isEmpty(skillTreePostForm.job)} ? @{|/skilltree/${skillTreePostForm.job}|} : @{/skilltree})">목록으로</a>
				</div>
			</form>
		</div>
	</div>
</div>
<script layout:fragment="script" type="text/javascript">
	(() => {
		const form = document.querySelector(".skilltree-post-form");
		if (!form) {
			return;
		}
		const returnUrl = form.dataset.returnUrl;
		if (!returnUrl) {
			return;
		}
		const skipKey = "skilltreePostFormBackSkip";

		form.addEventListener("submit", () => {
			sessionStorage.setItem(skipKey, JSON.stringify({
				path: window.location.pathname + window.location.search,
				returnUrl: returnUrl
			}));
		});

		window.addEventListener("pageshow", (event) => {
			const raw = sessionStorage.getItem(skipKey);
			if (!raw) {
				return;
			}
			const navigation = performance.getEntriesByType("navigation");
			const isBackForward = event.persisted || (navigation.length > 0 && navigation[0].type === "back_forward");
			if (!isBackForward) {
				return;
			}
			try {
				const saved = JSON.parse(raw);
				if (saved.path === window.location.pathname + window.location.search && saved.returnUrl) {
					sessionStorage.removeItem(skipKey);
					window.location.replace(saved.returnUrl);
				}
			} catch (error) {
				sessionStorage.removeItem(skipKey);
			}
		});
	})();
</script>
</html>
