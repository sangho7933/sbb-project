<html layout:decorate="~{a2c_layout}">
<div layout:fragment="content" class="board-shell">
	<div class="container-xl">
		<div class="detail-breadcrumb">
			<a th:href="@{/}">A2C</a>
			<span>/</span>
			<a th:href="@{|/boards/${currentCategory.code}|}" th:text="${currentCategory.label}">자유게시판</a>
		</div>

		<article class="panel-surface detail-card">
			<div class="detail-card-head">
				<span class="board-post-chip" th:text="${currentCategory.label}">자유게시판</span>
				<div class="detail-meta">
					<span th:text="|조회 ${post.viewCount}|">조회 0</span>
					<span th:text="|추천 ${#sets.size(post.voter)}|">추천 0</span>
					<span th:text="|비추천 ${#sets.size(post.dislikeVoter)}|">비추천 0</span>
				</div>
			</div>
			<h1 th:text="${post.subject}">게시글 제목</h1>
			<div class="detail-author-row">
				<span th:text="${post.author != null ? post.author.username : '익명'}">익명</span>
				<span th:text="${#temporals.format(post.createDate, 'yyyy-MM-dd HH:mm')}">2026-04-07 12:00</span>
			</div>
			<div class="detail-content" th:utext="${@commonUtil.markdown(post.content)}"></div>

			<div class="post-media-shell" th:if="${post.hasYoutubeVideo()}">
				<div class="post-media-head">
					<strong>유튜브</strong>
					<span>첨부된 영상</span>
				</div>
				<div class="post-media-box">
					<div class="responsive-embed">
						<iframe
							th:src="${post.youtubeEmbedUrl}"
							frameborder="0"
							allowfullscreen>
						</iframe>
					</div>
				</div>
			</div>

			<div class="post-media-shell" th:if="${post.hasMedia()}">
				<div class="post-media-head">
					<strong th:text="${post.hasVideoMedia()} ? '동영상' : '이미지'">미디어</strong>
					<span th:text="${post.mediaOriginalName}">첨부 파일</span>
				</div>
				<div class="post-media-box">
					<video th:if="${post.hasVideoMedia()}" class="post-media-video" controls preload="metadata">
						<source th:src="${post.mediaPath}" th:type="${post.mediaContentType}">
					</video>
					<img th:if="${post.hasImageMedia()}" class="post-media-image" th:src="${post.mediaPath}" th:alt="${post.mediaOriginalName}">
					<a class="btn btn-a2c-secondary btn-sm" th:href="${post.mediaPath}" target="_blank" rel="noopener">미디어 열기</a>
				</div>
			</div>

			<div class="detail-action-row">
				<a href="javascript:void(0);" class="btn btn-like action-confirm"
					th:data-uri="@{|/boards/${currentCategory.code}/posts/${post.id}/like|}"
					th:classappend="${#authorization.expression('isAuthenticated()') and post.voter.?[username == #authentication.name].size() > 0} ? ' is-active'"
					data-message="이 게시글을 추천하시겠습니까?">추천</a>
				<a href="javascript:void(0);" class="btn btn-dislike action-confirm"
					th:data-uri="@{|/boards/${currentCategory.code}/posts/${post.id}/dislike|}"
					th:classappend="${#authorization.expression('isAuthenticated()') and post.dislikeVoter.?[username == #authentication.name].size() > 0} ? ' is-active'"
					data-message="이 게시글을 비추천하시겠습니까?">비추천</a>
				<a class="btn btn-edit"
					th:if="${#authorization.expression('isAuthenticated()') and post.author != null and #authentication != null and #authentication.name == post.author.username}"
					th:href="@{|/boards/${currentCategory.code}/posts/${post.id}/edit|}">수정</a>
				<a href="javascript:void(0);" class="btn btn-delete action-confirm"
					th:if="${#authorization.expression('isAuthenticated()') and post.author != null and #authentication != null and #authentication.name == post.author.username}"
					th:data-uri="@{|/boards/${currentCategory.code}/posts/${post.id}/delete|}"
					data-message="이 게시글을 삭제하시겠습니까?">삭제</a>
				<form th:if="${adminMode and !(post.author != null and #authentication != null and #authentication.name == post.author.username)}"
					th:action="@{|/admin/posts/${post.id}/delete|}" method="post"
					onsubmit="return confirm('이 게시글을 삭제하시겠습니까?');">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<input type="hidden" name="redirect" th:value="@{|/boards/${currentCategory.code}|}" />
					<button type="submit" class="btn btn-delete">관리자 삭제</button>
				</form>
			</div>
		</article>

		<section class="comment-section" th:with="rootComments=${post.commentList != null ? post.commentList.?[parentComment == null] : null}">
			<div class="section-heading-row">
				<div>
					<span class="section-kicker">댓글</span>
					<h2 class="section-title" th:text="|댓글 ${post.commentCount}|">댓글 0</h2>
				</div>
			</div>

			<!-- 루트 댓글과 답글이 같은 메타/액션 묶음을 재사용한다. -->
			<div class="comment-list-stack" th:if="${!#lists.isEmpty(rootComments)}">
				<article class="panel-surface comment-card" th:each="comment : ${rootComments}">
					<a th:id="|comment_${comment.id}|"></a>
					<th:block th:replace="~{::commentMetaBlock(comment=${comment})}"></th:block>
					<div class="detail-content" th:if="${!comment.deleted}" th:utext="${@commonUtil.markdown(comment.content)}"></div>
					<div class="detail-content" th:if="${comment.deleted}"
						th:text="${comment.content}">삭제된 댓글입니다.</div>
					<th:block th:if="${!comment.deleted}">
						<th:block
							th:replace="~{::commentActionButtons(comment=${comment}, allowReply=${true}, replyFormTarget=|replyForm_${comment.id}|, adminRedirectUrl=|/boards/${currentCategory.code}/posts/${post.id}|)}">
						</th:block>
					</th:block>

					<form th:if="${#authorization.expression('isAuthenticated()')}" class="comment-reply-form d-none"
						th:id="|replyForm_${comment.id}|"
						th:action="@{|/comments/create/${post.id}|}" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
						<input type="hidden" name="parentId" th:value="${comment.id}">
						<textarea name="content" class="form-control" rows="4" placeholder="답글을 입력하세요"></textarea>
						<div class="comment-reply-actions">
							<button type="submit" class="btn btn-reply btn-sm">답글 등록</button>
							<button type="button" class="btn btn-edit btn-sm comment-reply-cancel"
								th:data-target="|replyForm_${comment.id}|">취소</button>
						</div>
					</form>

					<div class="comment-reply-list" th:if="${!#lists.isEmpty(comment.childComments)}">
						<article class="panel-surface comment-card comment-reply-card" th:each="reply : ${comment.childComments}">
							<a th:id="|comment_${reply.id}|"></a>
							<th:block th:replace="~{::commentMetaBlock(comment=${reply})}"></th:block>
							<div class="detail-content" th:if="${!reply.deleted}" th:utext="${@commonUtil.markdown(reply.content)}"></div>
							<div class="detail-content" th:if="${reply.deleted}"
								th:text="${reply.content}">삭제된 댓글입니다.</div>
							<th:block th:if="${!reply.deleted}">
								<th:block
									th:replace="~{::commentActionButtons(comment=${reply}, allowReply=${false}, replyFormTarget='', adminRedirectUrl=|/boards/${currentCategory.code}/posts/${post.id}|)}">
								</th:block>
							</th:block>
						</article>
					</div>
				</article>
			</div>

			<div class="empty-board-message" th:if="${#lists.isEmpty(rootComments)}">첫 댓글을 남겨보세요.</div>
		</section>

		<section class="panel-surface comment-compose-card">
			<div class="section-heading-row">
				<div>
					<span class="section-kicker">댓글 작성</span>
					<h2 class="section-title">댓글 작성</h2>
				</div>
			</div>
			<form th:action="@{|/comments/create/${post.id}|}" th:object="${boardCommentForm}" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
				<input type="hidden" th:field="*{parentId}" />
				<div th:replace="~{form_feedback :: formFeedbackFragment}"></div>
				<textarea th:if="${#authorization.expression('isAnonymous()')}" disabled th:field="*{content}" class="form-control"
					rows="8" placeholder="로그인 후 댓글을 작성할 수 있습니다."></textarea>
				<textarea th:if="${#authorization.expression('isAuthenticated()')}" th:field="*{content}" class="form-control" rows="8"
					placeholder="댓글을 입력하세요"></textarea>
				<input th:if="${#authorization.expression('isAuthenticated()')}" type="submit" value="댓글 등록" class="btn btn-a2c-primary mt-3">
			</form>
		</section>
	</div>
</div>
<script layout:fragment="script" type="text/javascript">
	document.querySelectorAll(".action-confirm").forEach((element) => {
		element.addEventListener("click", function () {
			if (confirm(this.dataset.message)) {
				location.href = this.dataset.uri;
			}
		});
	});

	document.querySelectorAll(".comment-reply-toggle").forEach((element) => {
		element.addEventListener("click", function () {
			const target = document.getElementById(this.dataset.target);
			if (target) {
				target.classList.toggle("d-none");
			}
		});
	});

	document.querySelectorAll(".comment-reply-cancel").forEach((element) => {
		element.addEventListener("click", function () {
			const target = document.getElementById(this.dataset.target);
			if (target) {
				target.classList.add("d-none");
			}
		});
	});
</script>
<!-- 댓글 카드 상단 메타를 루트/답글에서 함께 사용한다. -->
<th:block th:fragment="commentMetaBlock(comment)">
	<div class="comment-card-head">
		<div class="detail-author-row">
			<span th:if="${!comment.deleted}" th:text="${comment.author != null ? comment.author.username : '익명'}">익명</span>
			<th:block th:replace="~{::commentStateBadge(deleted=${comment.deleted})}"></th:block>
			<span th:text="${#temporals.format(comment.createDate, 'yyyy-MM-dd HH:mm')}">2026-04-07 12:00</span>
		</div>
		<div class="detail-meta">
			<span th:text="|추천 ${#sets.size(comment.voter)}|">추천 0</span>
			<span th:text="|비추천 ${#sets.size(comment.dislikeVoter)}|">비추천 0</span>
		</div>
	</div>
</th:block>
<!-- 삭제 상태 badge만 분리해 텍스트와 노출 조건을 같이 유지한다. -->
<th:block th:fragment="commentStateBadge(deleted)">
	<span th:if="${deleted}" class="comment-state-badge">삭제된 댓글</span>
</th:block>
<!-- 댓글/답글 액션 버튼과 관리자 삭제 폼을 같은 규칙으로 묶는다. -->
<div th:fragment="commentActionButtons(comment, allowReply, replyFormTarget, adminRedirectUrl)" class="detail-action-row">
	<a href="javascript:void(0);" class="btn btn-like btn-sm action-confirm"
		th:classappend="${#authorization.expression('isAuthenticated()') and comment.voter.?[username == #authentication.name].size() > 0} ? ' is-active'"
		th:data-uri="@{|/comments/like/${comment.id}|}"
		data-message="이 댓글을 추천하시겠습니까?">추천</a>
	<a href="javascript:void(0);" class="btn btn-dislike btn-sm action-confirm"
		th:classappend="${#authorization.expression('isAuthenticated()') and comment.dislikeVoter.?[username == #authentication.name].size() > 0} ? ' is-active'"
		th:data-uri="@{|/comments/dislike/${comment.id}|}"
		data-message="이 댓글을 비추천하시겠습니까?">비추천</a>
	<button type="button" class="btn btn-reply btn-sm comment-reply-toggle"
		th:if="${allowReply and #authorization.expression('isAuthenticated()')}" th:data-target="${replyFormTarget}">답글</button>
	<a class="btn btn-edit btn-sm"
		th:if="${#authorization.expression('isAuthenticated()') and comment.author != null and #authentication != null and #authentication.name == comment.author.username}"
		th:href="@{|/comments/edit/${comment.id}|}">수정</a>
	<a href="javascript:void(0);" class="btn btn-delete btn-sm action-confirm"
		th:if="${#authorization.expression('isAuthenticated()') and comment.author != null and #authentication != null and #authentication.name == comment.author.username}"
		th:data-uri="@{|/comments/delete/${comment.id}|}"
		data-message="이 댓글을 삭제하시겠습니까?">삭제</a>
	<form th:if="${adminMode and !(comment.author != null and #authentication != null and #authentication.name == comment.author.username)}"
		th:action="@{|/admin/comments/${comment.id}/delete|}" method="post"
		onsubmit="return confirm('이 댓글을 삭제하시겠습니까?');">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
		<input type="hidden" name="redirect" th:value="${adminRedirectUrl}" />
		<button type="submit" class="btn btn-delete btn-sm">관리자 삭제</button>
	</form>
</div>
</html>
