<html layout:decorate="~{a2c_layout}">
<div layout:fragment="content" class="board-shell trade-market-shell">
	<div class="container board-form-shell">
		<div class="panel-surface form-panel trade-form-panel">
			<div class="form-panel-head">
				<span class="section-kicker">거래 등록</span>
				<h1>상품 등록</h1>
				<p class="trade-inline-hint" th:if="${currentUser != null}" th:text="${'현재 보유 골드 ' + #numbers.formatInteger(currentUser.gold, 1, 'COMMA') + 'G'}"></p>
			</div>
			<form th:object="${tradeItemForm}" th:action="@{/trade/items/new}" method="post" class="board-form-stack">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				<div th:replace="~{form_feedback :: formFeedbackFragment}"></div>

				<div class="trade-form-grid">
					<div class="form-group-stack">
						<label for="category" class="form-label">카테고리</label>
						<select id="category" th:field="*{category}" class="form-select">
							<option value="">카테고리 선택</option>
							<option th:each="categoryOption : ${categories}" th:value="${categoryOption}" th:text="${categoryOption}"></option>
						</select>
					</div>
					<div class="form-group-stack">
						<label for="catalogItemId" class="form-label">아이템 선택</label>
						<select id="catalogItemId" th:field="*{catalogItemId}" class="form-select">
							<option value="">아이템 선택</option>
							<option th:each="catalogItem : ${catalogItems}" th:value="${catalogItem.id}"
								th:data-category="${catalogItem.category}" th:data-image="${catalogItem.imageUrl}" th:text="${catalogItem.itemName}"></option>
						</select>
					</div>
				</div>

				<div class="trade-form-preview panel-surface">
					<img id="tradeCatalogPreview" src="" alt="선택한 아이템 미리보기" class="d-none">
					<div id="tradeCatalogPreviewEmpty" class="trade-card-placeholder">아이템 미리보기</div>
				</div>

				<div class="trade-form-grid">
					<div class="form-group-stack">
						<label for="price" class="form-label">가격</label>
						<input id="price" type="number" min="0" th:field="*{price}" class="form-control" placeholder="100000">
					</div>
					<div class="form-group-stack">
						<label for="options" class="form-label">추가 옵션</label>
						<textarea id="options" th:field="*{options}" class="form-control" rows="4"
							placeholder="강화 수치, 거래 조건, 추가 설명 등을 입력하세요"></textarea>
					</div>
				</div>

				<div class="form-action-row">
					<button type="submit" class="btn btn-a2c-primary">등록하기</button>
					<a class="btn btn-a2c-secondary" th:href="@{/trade/items}">목록으로</a>
				</div>
			</form>
		</div>
	</div>
</div>
<script layout:fragment="script" type="text/javascript">
	const categorySelect = document.getElementById('category');
	const itemSelect = document.getElementById('catalogItemId');
	const previewImage = document.getElementById('tradeCatalogPreview');
	const previewEmpty = document.getElementById('tradeCatalogPreviewEmpty');

	function refreshCatalogItems() {
		const selectedCategory = categorySelect.value;
		let firstVisibleValue = '';
		Array.from(itemSelect.options).forEach((option, index) => {
			if (index === 0) {
				option.hidden = false;
				return;
			}
			const matches = !selectedCategory || option.dataset.category === selectedCategory;
			option.hidden = !matches;
			if (matches && !firstVisibleValue) {
				firstVisibleValue = option.value;
			}
		});

		const selectedOption = itemSelect.options[itemSelect.selectedIndex];
		if (!selectedOption || selectedOption.hidden) {
			itemSelect.value = firstVisibleValue;
		}
		refreshPreview();
	}

	function refreshPreview() {
		const selectedOption = itemSelect.options[itemSelect.selectedIndex];
		if (selectedOption && selectedOption.dataset.image) {
			previewImage.src = selectedOption.dataset.image;
			previewImage.classList.remove('d-none');
			previewEmpty.classList.add('d-none');
		} else {
			previewImage.src = '';
			previewImage.classList.add('d-none');
			previewEmpty.classList.remove('d-none');
		}
	}

	if (categorySelect && itemSelect) {
		if (!categorySelect.value) {
			const firstCatalogOption = Array.from(itemSelect.options).find((option, index) => index > 0 && option.dataset.category);
			if (firstCatalogOption) {
				categorySelect.value = firstCatalogOption.dataset.category;
			}
		}
		refreshCatalogItems();
		categorySelect.addEventListener('change', refreshCatalogItems);
		itemSelect.addEventListener('change', refreshPreview);
	}
</script>
</html>
