<html layout:decorate="~{a2c_layout}">
<div layout:fragment="content" class="board-shell">
	<div class="container-xl">
		<div class="detail-breadcrumb">
			<a th:href="@{/}">A2C</a>
			<span>/</span>
			<a th:href="@{/skilltree}">스킬트리</a>
			<span>/</span>
			<a th:href="@{|/skilltree/${currentJob.slug}|}" th:text="${currentJob.label}">검성</a>
		</div>

		<div class="skilltree-job-tab-row skilltree-job-tab-row-tight">
			<a th:each="job : ${skillTreeJobs}" class="skilltree-job-tab"
				th:classappend="' ' + ${job.cssClass} + (${currentJob == job} ? ' active' : '')"
				th:href="@{|/skilltree/${job.slug}|}">
				<span th:text="${job.icon}">⚔</span>
				<span th:text="${job.label}">검성</span>
			</a>
		</div>

		<article class="panel-surface detail-card">
			<div class="detail-card-head">
				<span class="board-post-chip" th:text="|${post.job.icon} ${post.job.label}|">검성</span>
				<div class="detail-meta">
					<span th:text="${'조회 ' + post.viewCount}"></span>
					<span th:text="${'좋아요 ' + #sets.size(post.voter)}"></span>
					<span th:text="${'싫어요 ' + #sets.size(post.dislikeVoter)}"></span>
				</div>
			</div>
			<h1 th:text="${post.subject}"></h1>
			<div class="detail-author-row">
				<span th:text="${post.author != null ? post.author.username : '익명'}"></span>
				<span th:text="${#temporals.format(post.createDate, 'yyyy-MM-dd HH:mm')}"></span>
			</div>
			<div class="detail-content" th:utext="${@commonUtil.markdown(post.content)}"></div>
			<div class="detail-action-row">
				<form th:if="${#authorization.expression('isAuthenticated()')}" th:action="@{|/skilltree/posts/${post.id}/like|}"
					class="d-inline action-confirm-form" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<button type="submit" class="btn btn-like"
						th:classappend="${post.voter.?[username == #authentication.name].size() > 0} ? ' is-active'"
						data-message="이 글에 좋아요를 누르시겠습니까?">좋아요</button>
				</form>
				<form th:if="${#authorization.expression('isAnonymous()')}" th:action="@{/user/login}" class="d-inline" method="get">
					<button type="submit" class="btn btn-like">좋아요</button>
				</form>
				<form th:if="${#authorization.expression('isAuthenticated()')}" th:action="@{|/skilltree/posts/${post.id}/dislike|}"
					class="d-inline action-confirm-form" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<button type="submit" class="btn btn-dislike"
						th:classappend="${post.dislikeVoter.?[username == #authentication.name].size() > 0} ? ' is-active'"
						data-message="이 글에 싫어요를 누르시겠습니까?">싫어요</button>
				</form>
				<form th:if="${#authorization.expression('isAnonymous()')}" th:action="@{/user/login}" class="d-inline" method="get">
					<button type="submit" class="btn btn-dislike">싫어요</button>
				</form>
				<a class="btn btn-edit"
					th:if="${#authorization.expression('isAuthenticated()') and post.author != null and #authentication != null and #authentication.name == post.author.username}"
					th:href="@{/skilltree/posts/{id}/edit(id=${post.id},returnUrl=${'/skilltree/' + post.job.slug + '/posts/' + post.id})}">수정</a>
				<form th:if="${#authorization.expression('isAuthenticated()') and post.author != null and #authentication != null and #authentication.name == post.author.username}"
					th:action="@{|/skilltree/posts/${post.id}/delete|}"
					class="d-inline action-confirm-form" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<button type="submit" class="btn btn-delete"
						data-message="이 글을 삭제하시겠습니까?">삭제</button>
				</form>
				<form th:if="${adminMode and !(post.author != null and #authentication != null and #authentication.name == post.author.username)}"
					th:action="@{|/admin/skilltree/posts/${post.id}/delete|}" class="d-inline" method="post"
					onsubmit="return confirm('이 게시글을 삭제하시겠습니까?');">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<input type="hidden" name="redirect" th:value="@{|/skilltree/${post.job.slug}/posts/${post.id}|}" />
					<button type="submit" class="btn btn-delete">관리자 삭제</button>
				</form>
			</div>
		</article>

		<section class="comment-section"
			th:with="rootComments=${post.commentList != null ? post.commentList.?[parentComment == null] : null}">
			<div class="section-heading-row">
				<div>
					<span class="section-kicker">댓글</span>
					<h2 class="section-title" th:text="|댓글 ${post.commentList != null ? #lists.size(post.commentList) : 0}개|"></h2>
				</div>
			</div>
			<!-- 루트 댓글과 답글이 같은 메타/액션 fragment를 공유한다. -->
			<div class="comment-list-stack" th:if="${!#lists.isEmpty(rootComments)}">
				<article class="panel-surface comment-card" th:each="comment : ${rootComments}">
					<a th:id="|comment_${comment.id}|"></a>
					<th:block th:replace="~{::commentMetaBlock(comment=${comment}, deletedLabel='삭제된 댓글')}"></th:block>
					<div class="detail-content" th:utext="${@commonUtil.markdown(comment.content)}"></div>
					<th:block th:if="${!comment.deleted}">
						<th:block
							th:replace="~{::commentActionButtons(comment=${comment}, targetLabel='댓글', allowReply=${true}, replyFormTarget=|replyForm_${comment.id}|, adminRedirectUrl=|/skilltree/${post.job.slug}/posts/${post.id}|)}">
						</th:block>
					</th:block>
					<form th:if="${#authorization.expression('isAuthenticated()')}" class="comment-reply-form d-none"
						th:id="|replyForm_${comment.id}|"
						th:action="@{|/skilltree/comments/create/${post.id}|}" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
						<input type="hidden" name="parentId" th:value="${comment.id}">
						<textarea name="content" class="form-control" rows="4" placeholder="대댓글을 입력하세요"></textarea>
						<div class="comment-reply-actions">
							<button type="submit" class="btn btn-reply btn-sm">답글 등록</button>
							<button type="button" class="btn btn-edit btn-sm skilltree-reply-cancel" th:data-target="|replyForm_${comment.id}|">취소</button>
						</div>
					</form>
					<div class="comment-reply-list" th:if="${!#lists.isEmpty(comment.childComments)}">
						<article class="panel-surface comment-card comment-reply-card" th:each="reply : ${comment.childComments}">
							<a th:id="|comment_${reply.id}|"></a>
							<th:block th:replace="~{::commentMetaBlock(comment=${reply}, deletedLabel='삭제된 답글')}"></th:block>
							<div class="detail-content" th:utext="${@commonUtil.markdown(reply.content)}"></div>
							<th:block th:if="${!reply.deleted}">
								<th:block
									th:replace="~{::commentActionButtons(comment=${reply}, targetLabel='답글', allowReply=${false}, replyFormTarget='', adminRedirectUrl=|/skilltree/${post.job.slug}/posts/${post.id}|)}">
								</th:block>
							</th:block>
						</article>
					</div>
				</article>
			</div>
			<div class="empty-board-message" th:if="${#lists.isEmpty(rootComments)}">첫 댓글을 남겨보세요.</div>
		</section>

		<section class="panel-surface comment-compose-card">
			<div class="section-heading-row">
				<div>
					<span class="section-kicker">댓글 작성</span>
					<h2 class="section-title">댓글 작성</h2>
				</div>
			</div>
			<form th:action="@{|/skilltree/comments/create/${post.id}|}" th:object="${skillTreeCommentForm}" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
				<input type="hidden" th:field="*{parentId}" />
				<div th:replace="~{form_feedback :: formFeedbackFragment}"></div>
				<textarea th:if="${#authorization.expression('isAnonymous()')}" disabled th:field="*{content}" class="form-control" rows="8"
					placeholder="로그인 후 댓글을 작성할 수 있습니다."></textarea>
				<textarea th:if="${#authorization.expression('isAuthenticated()')}" th:field="*{content}" class="form-control" rows="8"
					placeholder="댓글을 입력하세요"></textarea>
				<input th:if="${#authorization.expression('isAuthenticated()')}" type="submit" value="댓글 등록" class="btn btn-a2c-primary mt-3">
			</form>
		</section>
	</div>
</div>
<script layout:fragment="script" type="text/javascript">
	document.querySelectorAll(".action-confirm-form").forEach((form) => {
		form.addEventListener("submit", function (event) {
			const submitButton = this.querySelector("[data-message]");
			const message = submitButton?.dataset.message || "진행하시겠습니까?";
			if (!confirm(message)) {
				event.preventDefault();
			}
		});
	});

	document.querySelectorAll(".skilltree-reply-toggle").forEach((element) => {
		element.addEventListener("click", function () {
			const target = document.getElementById(this.dataset.target);
			if (target) {
				target.classList.toggle("d-none");
			}
		});
	});

	document.querySelectorAll(".skilltree-reply-cancel").forEach((element) => {
		element.addEventListener("click", function () {
			const target = document.getElementById(this.dataset.target);
			if (target) {
				target.classList.add("d-none");
			}
		});
	});
</script>
<!-- 댓글/답글 공통 헤더 메타를 deletedLabel만 바꿔 재사용한다. -->
<th:block th:fragment="commentMetaBlock(comment, deletedLabel)">
	<div class="comment-card-head">
		<div class="detail-author-row">
			<span th:if="${!comment.deleted}" th:text="${comment.author != null ? comment.author.username : '익명'}"></span>
			<th:block th:replace="~{::commentStateBadge(deleted=${comment.deleted}, deletedLabel=${deletedLabel})}"></th:block>
			<span th:text="${#temporals.format(comment.createDate, 'yyyy-MM-dd HH:mm')}"></span>
		</div>
		<div class="detail-meta">
			<span th:text="${'좋아요 ' + #sets.size(comment.voter)}"></span>
			<span th:text="${'싫어요 ' + #sets.size(comment.dislikeVoter)}"></span>
		</div>
	</div>
</th:block>
<!-- 댓글과 답글의 삭제 상태 문구만 분리해 공통 badge로 쓴다. -->
<th:block th:fragment="commentStateBadge(deleted, deletedLabel)">
	<span th:if="${deleted}" class="comment-state-badge" th:text="${deletedLabel}">삭제된 댓글</span>
</th:block>
<!-- 댓글 종류별 확인 문구와 관리자 복귀 경로를 같은 액션 묶음으로 유지한다. -->
<div th:fragment="commentActionButtons(comment, targetLabel, allowReply, replyFormTarget, adminRedirectUrl)"
	class="detail-action-row">
	<form th:if="${#authorization.expression('isAuthenticated()')}" th:action="@{|/skilltree/comments/like/${comment.id}|}"
		class="d-inline action-confirm-form" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
		<button type="submit" class="btn btn-like btn-sm"
			th:classappend="${comment.voter.?[username == #authentication.name].size() > 0} ? ' is-active'"
			th:data-message="|이 ${targetLabel}에 좋아요를 누르시겠습니까?|">좋아요</button>
	</form>
	<form th:if="${#authorization.expression('isAnonymous()')}" th:action="@{/user/login}" class="d-inline" method="get">
		<button type="submit" class="btn btn-like btn-sm">좋아요</button>
	</form>
	<form th:if="${#authorization.expression('isAuthenticated()')}" th:action="@{|/skilltree/comments/dislike/${comment.id}|}"
		class="d-inline action-confirm-form" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
		<button type="submit" class="btn btn-dislike btn-sm"
			th:classappend="${comment.dislikeVoter.?[username == #authentication.name].size() > 0} ? ' is-active'"
			th:data-message="|이 ${targetLabel}에 싫어요를 누르시겠습니까?|">싫어요</button>
	</form>
	<form th:if="${#authorization.expression('isAnonymous()')}" th:action="@{/user/login}" class="d-inline" method="get">
		<button type="submit" class="btn btn-dislike btn-sm">싫어요</button>
	</form>
	<button type="button" class="btn btn-reply btn-sm skilltree-reply-toggle"
		th:if="${allowReply and #authorization.expression('isAuthenticated()')}" th:data-target="${replyFormTarget}">답글</button>
	<a class="btn btn-edit btn-sm"
		th:if="${#authorization.expression('isAuthenticated()') and comment.author != null and #authentication != null and #authentication.name == comment.author.username}"
		th:href="@{|/skilltree/comments/edit/${comment.id}|}">수정</a>
	<form th:if="${#authorization.expression('isAuthenticated()') and comment.author != null and #authentication != null and #authentication.name == comment.author.username}"
		th:action="@{|/skilltree/comments/delete/${comment.id}|}" class="d-inline action-confirm-form" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
		<button type="submit" class="btn btn-delete btn-sm"
			th:data-message="|이 ${targetLabel}을 삭제하시겠습니까?|">삭제</button>
	</form>
	<form th:if="${adminMode and !(comment.author != null and #authentication != null and #authentication.name == comment.author.username)}"
		th:action="@{|/admin/skilltree/comments/${comment.id}/delete|}" class="d-inline" method="post"
		onsubmit="return confirm('이 댓글을 삭제하시겠습니까?');">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
		<input type="hidden" name="redirect" th:value="${adminRedirectUrl}" />
		<button type="submit" class="btn btn-delete btn-sm">관리자 삭제</button>
	</form>
</div>
</html>
